apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: kubevirt
spec:
  podSelector: { }
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-api-server
  namespace: kubevirt
spec:
  podSelector: { }
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 6443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-dns
  namespace: kubevirt
spec:
  podSelector: { }
  policyTypes:
    - Egress
  egress:
    - to:
        # allow talking to the kube-dns pods in kubevirt
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: TCP
          port: dns-tcp
        - protocol: UDP
          port: dns
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-metrics
  namespace: kubevirt
spec:
  podSelector: { }
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: metrics
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-virt-api-webhook-server
  namespace: kubevirt
spec:
  podSelector:
    matchLabels:
      kubevirt.io: virt-api
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-from-virt-api-to-virt-handler
  namespace: kubevirt
spec:
  podSelector:
    matchLabels:
      kubevirt.io: virt-api
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 8186
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-virt-handler
  namespace: kubevirt
spec:
  podSelector:
    matchLabels:
      kubevirt.io: virt-handler
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8186
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-virt-operator-webhook-server
  namespace: kubevirt
spec:
  podSelector:
    matchLabels:
      kubevirt.io: virt-operator
  policyTypes:
    - Ingress
  ingress:
    - ports:
