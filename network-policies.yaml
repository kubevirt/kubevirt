---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-handler-to-handler
  namespace: kubevirt
spec:
  podSelector:
    matchLabels:
      kubevirt.io: virt-handler
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              kubevirt.io: virt-handler
  egress:
    - to:
        - podSelector:
            matchLabels:
              kubevirt.io: virt-handler