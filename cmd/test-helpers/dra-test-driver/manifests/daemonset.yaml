apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dra-test-driver
  namespace: kubevirt
spec:
  selector:
    matchLabels:
      app: dra-test-driver
  updateStrategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: dra-test-driver
    spec:
      priorityClassName: system-node-critical
      serviceAccountName: dra-test-driver
      containers:
      - name: plugin
        image: registry:5000/kubevirt/test-helpers:devel
        imagePullPolicy: Always
        command: ["/usr/bin/dra-test-driver", "--logtostderr=true", "-v=5"]
        securityContext:
          privileged: true
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        # Number of network devices to advertise
        - name: NUM_DEVICES
          value: "10"
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        volumeMounts:
        - name: plugins-registry
          mountPath: /var/lib/kubelet/plugins_registry
        - name: plugins
          mountPath: /var/lib/kubelet/plugins
        - name: cdi
          mountPath: /etc/cdi
        - name: kubevirt-cdi
          mountPath: /var/run/kubevirt/cdi
          mountPropagation: Bidirectional
      volumes:
      - name: plugins-registry
        hostPath:
          path: /var/lib/kubelet/plugins_registry
      - name: plugins
        hostPath:
          path: /var/lib/kubelet/plugins
      - name: cdi
        hostPath:
          path: /etc/cdi
      - name: kubevirt-cdi
        hostPath:
          path: /var/run/kubevirt/cdi
          type: DirectoryOrCreate
