# Source: dra-driver-sriov-chart/templates/dra-driver.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sriov-dra-dra-driver-sriov-chart-kubeletplugin
  namespace: dra-driver-sriov
  labels:
    app.kubernetes.io/name: dra-driver-sriov-chart
    app.kubernetes.io/instance: sriov-dra
    app.kubernetes.io/component: kubeletplugin
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: dra-driver-sriov-chart
      app.kubernetes.io/instance: sriov-dra
      app.kubernetes.io/component: kubeletplugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dra-driver-sriov-chart
        app.kubernetes.io/instance: sriov-dra
        app.kubernetes.io/component: kubeletplugin
    spec:
      terminationGracePeriodSeconds: 30
      hostNetwork: true
      hostPID: true
      priorityClassName: system-node-critical
      serviceAccountName: sriov-dra-dra-driver-sriov-chart-service-account
      securityContext:
        {}
      initContainers:
      - args:
        - --no-sleep
        image: ghcr.io/k8snetworkplumbingwg/sriov-cni:v2.10.0
        imagePullPolicy: IfNotPresent
        name: sriov-cni
        resources:
          requests:
            cpu: 10m
            memory: 10Mi
        securityContext:
          privileged: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /host/opt/cni/bin
          name: cni-bin
        - mountPath: /host/etc/os-release
          name: os-release
          readOnly: true
      containers:
      - name: plugin
        securityContext:
          privileged: true
        image: quay.io/oshoval/dra-driver-sriov:dapimac
        imagePullPolicy: Always
        command:
          # - dlv
          # - --listen=:2345
          # - --headless=true
          # - --api-version=2
          # - --accept-multiclient
          # - exec
          - /usr/bin/dra-driver-sriov
        resources:
          {}
        
        env:
        - name: CDI_ROOT
          value: /var/run/cdi
        - name: KUBELET_REGISTRAR_DIRECTORY_PATH
          value: "/var/lib/kubelet/plugins_registry"
        - name: KUBELET_PLUGINS_DIRECTORY_PATH
          value: "/var/lib/kubelet/plugins"
        - name: NRI_PLUGIN_NAME
          value: "dra-driver-sriov"
        - name: NRI_PLUGIN_IDX
          value: "42"
        - name: DEFAULT_INTERFACE_PREFIX
          value: "vfnet"
        - name: ENABLE_DEVICE_METADATA
          value: "true"
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: HEALTHCHECK_PORT
          value: "-1"
        # Logging configuration
        - name: V
          value: "3"
        - name: LOG_FORMAT
          value: "text"
        - name: ALSOLOGTOSTDERR
          value: "true"
        volumeMounts:
        - name: plugins-registry
          mountPath: "/var/lib/kubelet/plugins_registry"
        - name: plugins
          mountPath: "/var/lib/kubelet/plugins"
        - name: cdi
          mountPath: /var/run/cdi
        - name: cri-socket
          mountPath: /var/run/nri/nri.sock
        - name: netns
          mountPath: /var/run/netns
          mountPropagation: HostToContainer
        - name: cni-results
          mountPath: /var/lib/cni/
        - name: cni-bin
          mountPath: /opt/cni/bin
      volumes:
      - name: cni-results
        hostPath:
          path: /var/lib/cni/
      - name: netns
        hostPath:
          path: /var/run/netns
      - name: cri-socket
        hostPath:
          path: /var/run/nri/nri.sock
          type: Socket
      - name: plugins-registry
        hostPath:
          path: "/var/lib/kubelet/plugins_registry"
      - name: plugins
        hostPath:
          path: "/var/lib/kubelet/plugins"
      - name: cdi
        hostPath:
          path: /var/run/cdi
      - hostPath:
          path: /opt/cni/bin
        name: cni-bin
      - hostPath:
          path: /etc/os-release
          type: File
        name: os-release
