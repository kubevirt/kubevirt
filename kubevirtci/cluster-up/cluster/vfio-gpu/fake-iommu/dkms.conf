# DKMS configuration for fake-iommu
#
# Install with DKMS:
#   sudo cp -r fake-iommu /usr/src/fake-iommu-1.0
#   sudo dkms add -m fake-iommu -v 1.0
#   sudo dkms build -m fake-iommu -v 1.0
#   sudo dkms install -m fake-iommu -v 1.0

PACKAGE_NAME="fake-iommu"
PACKAGE_VERSION="1.0"

BUILT_MODULE_NAME[0]="fake-iommu"
DEST_MODULE_LOCATION[0]="/extra"

AUTOINSTALL="yes"
