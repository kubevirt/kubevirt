- test_id: TS-CNV68916-008
  scenario_number: 8
  requirement_id: REQ-CDROM-SWAP-01
  tier: Tier 1
  priority: P0
  feature_area: cdrom_swap
  test_objective:
    title: CD-ROM media swap without restart
    description: Verify CD-ROM swap by replacing the DataVolume name in the volume reference; confirm new CD-ROM content is
      accessible in guest and old content is no longer present
    acceptance_criteria:
    - New CD-ROM content is accessible in guest
    - Old CD-ROM content is no longer present
  specific_preconditions:
  - requirement: Running VM with an injected CD-ROM (DataVolume A)
  - requirement: Second DataVolume (B) with different ISO content created and available
  test_steps:
    setup:
    - Create two DataVolumes with different ISO content (DV-A and DV-B)
    - Create and start a VM with CD-ROM pointing to DV-A
    - Verify DV-A content is accessible in guest
    test_execution:
    - action: Update volume reference in VM spec to point to DV-B instead of DV-A
    - action: Wait for swap to complete
    verification:
    - New CD-ROM content (DV-B) is accessible in guest
    - Old CD-ROM content (DV-A) is no longer present
    cleanup: &id007
    - Delete the test VM
    - Delete all DataVolumes/PVCs used for CD-ROM swap
  assertions:
  - description: CD-ROM content matches DV-B after swap
    type: data_integrity
  - description: DV-A content is no longer accessible
    type: state_check
  patterns:
    primary: storage-hotplug-001
    helpers_required: &id008
    - vm_factory
    - datavolume_factory
    - guest_console
    decorators: &id009
    - SigStorage
  variables:
    closure_scope:
    - name: ctx
      type: context.Context
    - name: namespace
      type: string
  test_structure:
