document_metadata:
  std_version: 2.1-enhanced
  jira_id: CNV-68916
  title: 'GA: Eject/Inject CD-ROM Support via Declarative Hotplug Volumes'
  stp_reference: outputs/stp/CNV-68916/CNV-68916_test_plan.md
  owning_sig: sig-storage
  participating_sigs:
  - sig-compute
  - sig-network
  qe_owner: Yan Du
  feature_gate: DeclarativeHotplugVolumes
  current_status: GA (off by default)
  enhancement: kubevirt/enhancements#31
  total_scenarios: 47
  tier_1_count: 38
  tier_2_count: 9
  p0_count: 11
  related_jira:
  - CNV-79690
  - CNV-77383
  - CNV-64402
  known_limitations:
  - Ephemeral hotplug volumes not supported when DeclarativeHotplugVolumes enabled
  - SATA CD-ROM drives cannot be hot-detached; triggers RestartRequired
  - 'PCI address stability across upgrades is an open concern (PR #17029)'
  - Feature is GA but off by default until telemetry confirms safety
  - VM must be running for hotplug operations to take effect on VMI
  - Volume ordering changes do not trigger RestartRequired
code_generation_config:
  std_version: 2.1-enhanced
  package_name: storage
  imports:
    go:
    - context
    - fmt
    - time
    - . "github.com/onsi/ginkgo/v2"
    - . "github.com/onsi/gomega"
    - metav1 "k8s.io/apimachinery/pkg/apis/meta/v1"
    - v1 "kubevirt.io/api/core/v1"
    - '"kubevirt.io/kubevirt/tests/decorators"'
    - '"kubevirt.io/kubevirt/tests/framework/kubevirt"'
    - '"kubevirt.io/kubevirt/tests/framework/matcher"'
    - '"kubevirt.io/kubevirt/tests/libkubevirt/config"'
    - '"kubevirt.io/kubevirt/tests/libvmi"'
    - '"kubevirt.io/kubevirt/tests/libvmifact"'
    - '"kubevirt.io/kubevirt/tests/libwait"'
    - '"kubevirt.io/kubevirt/tests/testsuite"'
    python:
    - pytest
    - ocp_resources.virtual_machine
    - ocp_resources.datavolume
    - utilities.virt
    - utilities.storage
    - utilities.hco
common_preconditions:
  namespace: test namespace (auto-created per test)
  cluster:
  - OpenShift cluster with OCP 4.18+ and CNV 4.22+
  - 3 control-plane + 2 worker nodes minimum
  - Hardware virtualization enabled (Intel VT-x or AMD-V)
  storage:
  - At least one StorageClass with dynamic provisioning and RWO support
  - CDI operator deployed and functional for DataVolume creation
  configuration:
  - DeclarativeHotplugVolumes feature gate enabled via HyperConverged CR
  - 'spec.featureGates.declarativeHotplugVolumes: true'
  tools:
  - virtctl CLI available
  - oc/kubectl CLI available
scenarios:
- test_id: TS-CNV68916-001
  scenario_number: 1
  requirement_id: REQ-CDROM-INJECT-01
  tier: Tier 1
  priority: P0
  feature_area: cdrom_inject
  test_objective:
    title: CD-ROM inject with DataVolume source on running VM
    description: Verify CD-ROM inject with DataVolume source on running VM with empty CD-ROM; confirm volume appears in VMI
      status and CD-ROM is mountable/readable in guest
    acceptance_criteria:
    - Volume appears in VMI status after inject
    - CD-ROM is mountable and readable in guest OS
  specific_preconditions:
  - requirement: Running VM with an empty CD-ROM disk defined in spec
  - requirement: DataVolume with ISO content created and available
  test_steps:
    setup:
    - Create a DataVolume with ISO content
    - Create and start a VM with an empty CD-ROM disk (disk without volume reference)
    - Verify VM is Running and guest OS is accessible
    - Verify /dev/sr0 exists in guest and reports 'No medium found'
    test_execution:
    - action: Add volume reference to the empty CD-ROM disk in VM spec pointing to the DataVolume
    - action: 'Wait for volume to appear in VMI status (timeout: 120s)'
    verification:
    - Volume appears in VMI status volumes list
    - CD-ROM is mountable in guest via mount /dev/sr0
    - CD-ROM content is readable in guest
    cleanup: &id001
    - Delete the test VM
    - Delete the DataVolume/PVC used for CD-ROM content
  assertions:
  - description: VMI status shows the injected volume
    type: state_check
  - description: CD-ROM mount succeeds in guest OS
    type: operation_success
  - description: CD-ROM content matches expected ISO content
    type: data_integrity
  patterns:
    primary: storage-hotplug-001
    helpers_required: &id002
    - vm_factory
    - datavolume_factory
    - guest_console
    decorators: &id003
    - SigStorage
  variables:
    closure_scope:
    - name: ctx
      type: context.Context
    - name: namespace
      type: string
  test_structure:
    describe: CD-ROM Hotplug Operations
    context: CD-ROM inject operations
    it: CD-ROM inject with DataVolume source on running VM
  code_structure:
    framework: ginkgo_v2
    pattern: Describe -> Context -> It
    pending: true
