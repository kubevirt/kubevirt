  requirement_id: REQ-E2E-SNAPSHOT-02
  tier: Tier 2
  priority: P1
  feature_area: e2e_snapshot
  test_objective:
    title: Restore of VM with hotplugged volumes
    description: Verify restore from snapshot preserves hotplugged volume configuration and data
    acceptance_criteria:
    - Restore preserves hotplugged volume configuration
    - Data is intact after restore
  specific_preconditions:
  - requirement: Snapshot of a VM with hotplugged volumes (ReadyToUse)
  test_steps:
    setup:
    - Create VM with hotplugged volumes and take a snapshot
    - Write known data to hotplugged disk
    - Verify snapshot is ReadyToUse
    test_execution:
    - action: Restore the VM from snapshot
    - action: Wait for restored VM to reach Running state
    - action: Verify hotplugged volume configuration
    - action: Verify data on hotplugged disk
    verification:
    - Restored VM has the hotplugged volume configuration
    - Data on hotplugged disk matches pre-snapshot data
    cleanup: *id046
  assertions:
  - description: Restore preserves hotplugged volume configuration and data
    type: data_integrity
  - description: Restored VM's hotplugged volumes are accessible in guest
    type: data_integrity
  patterns:
    primary: snapshot-001
    helpers_required: *id047
    decorators: *id048
  variables:
    closure_scope:
    - name: ctx
      type: context.Context
    - name: namespace
      type: string
  test_structure:
    class: TestCdromSnapshot
    method: test_ts_cnv68916_045
  code_structure:
    framework: pytest
    pattern: class -> method
    pending: true
- test_id: TS-CNV68916-046
  scenario_number: 46
  requirement_id: REQ-E2E-UPGRADE-01
  tier: Tier 2
  priority: P1
  feature_area: e2e_upgrade
  test_objective:
    title: Feature gate state preserved across upgrade
    description: Verify DeclarativeHotplugVolumes feature gate configuration survives OCP/CNV upgrade
    acceptance_criteria:
    - Feature gate configuration preserved after upgrade
  specific_preconditions:
  - requirement: Cluster with DeclarativeHotplugVolumes feature gate enabled
  - requirement: OCP/CNV upgrade path available
  - requirement: DeclarativeHotplugVolumes feature gate enabled (fixture-managed)
  test_steps:
    setup:
    - Verify feature gate is active
    test_execution:
    - action: Verify feature gate is enabled and CD-ROM hotplug operations succeed (pre-upgrade baseline)
    - action: Perform OCP/CNV upgrade
    - action: 'Wait for upgrade to complete (timeout: 1800s)'
    - action: Verify feature gate is still enabled (post-upgrade verification)
    verification:
    - DeclarativeHotplugVolumes feature gate is still enabled after upgrade
    cleanup: &id049
    - Delete the test VM
    - Delete the DataVolume/PVC used for upgrade test
  assertions:
  - description: Feature gate configuration survives upgrade
    type: upgrade_check
  - description: CD-ROM hotplug operations still work after upgrade
    type: operation_success
  patterns:
    primary: vm-lifecycle-001
    helpers_required: &id050
    - vm_factory
    - datavolume_factory
    - upgrade_helper
    decorators: &id051
    - SigStorage
  variables:
    closure_scope:
    - name: ctx
      type: context.Context
    - name: namespace
      type: string
  test_structure:
    class: TestCdromUpgrade
    method: test_ts_cnv68916_046
  code_structure:
    framework: pytest
    pattern: class -> method
    pending: true
- test_id: TS-CNV68916-047
  scenario_number: 47
  requirement_id: REQ-E2E-UPGRADE-02
  tier: Tier 2
  priority: P1
  feature_area: e2e_upgrade
  test_objective:
    title: VM with hotplugged volumes operational after upgrade
    description: Verify VM with hotplugged CD-ROM and disk volumes continues to function correctly after cluster upgrade
    acceptance_criteria:
    - VM operational after upgrade
    - Hotplugged volumes accessible after upgrade
  specific_preconditions:
  - requirement: Running VM with hotplugged CD-ROM and data disk
  - requirement: OCP/CNV upgrade path available
  test_steps:
    setup:
    - Create and start a VM with hotplugged CD-ROM and data disk
    - Verify both are accessible in guest
    test_execution:
    - action: Record content checksums of hotplugged volumes (pre-upgrade baseline)
    - action: Perform OCP/CNV upgrade
    - action: 'Wait for upgrade to complete (timeout: 1800s)'
    - action: Verify VM is Running
    - action: Verify hotplugged volumes are accessible
    - action: Verify content checksums match
    verification:
    - VM is Running after upgrade
    - CD-ROM and data disk are accessible
    - Content matches pre-upgrade checksums
    cleanup: *id049
  assertions:
  - description: VM with hotplugged volumes is fully operational after upgrade
    type: upgrade_check
  - description: Content checksums match pre-upgrade values
    type: data_integrity
  patterns:
    primary: vm-lifecycle-001
    helpers_required: *id050
    decorators: *id051
  variables:
    closure_scope:
    - name: ctx
      type: context.Context
    - name: namespace
      type: string
  test_structure:
    class: TestCdromUpgrade
    method: test_ts_cnv68916_047
  code_structure:
    framework: pytest
    pattern: class -> method
    pending: true
