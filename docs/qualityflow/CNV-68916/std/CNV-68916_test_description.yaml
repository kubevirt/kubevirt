  scenario_number: 3
  requirement_id: REQ-CDROM-INJECT-03
  tier: Tier 1
  priority: P0
  feature_area: cdrom_inject
  test_objective:
    title: Injected CD-ROM reflects correct content in guest
    description: Verify injected CD-ROM is mountable, readable, and shows expected file count and content inside guest OS
    acceptance_criteria:
    - CD-ROM content matches expected files and data
  specific_preconditions:
  - requirement: Running VM with empty CD-ROM disk
  - requirement: DataVolume with known ISO content (specific file count and filenames)
