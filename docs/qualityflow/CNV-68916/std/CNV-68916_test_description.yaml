    pattern: Describe -> Context -> It
    pending: true
- test_id: TS-CNV68916-004
  scenario_number: 4
  requirement_id: REQ-CDROM-INJECT-04
  tier: Tier 1
  priority: P1
  feature_area: cdrom_inject
  test_objective:
    title: '[NEGATIVE] CD-ROM inject blocked when feature gate is disabled'
    description: Verify that adding a volume to an empty CD-ROM disk does not hot-inject when DeclarativeHotplugVolumes gate
      is disabled (requires restart)
    acceptance_criteria:
    - Volume change is not hot-applied when feature gate is disabled
  specific_preconditions:
  - requirement: DeclarativeHotplugVolumes feature gate is disabled
  - requirement: Running VM with empty CD-ROM disk
  - requirement: DataVolume with ISO content available
  test_steps:
    setup:
    - Disable DeclarativeHotplugVolumes feature gate
    - Create and start a VM with empty CD-ROM disk
    - Verify VM is Running
    test_execution:
    - action: Add volume reference to empty CD-ROM disk in VM spec
    - action: Wait 60 seconds and check VM conditions for RestartRequired or error events
    verification:
    - CD-ROM is not hot-injected (guest still shows 'No medium found')
    - RestartRequired condition may be set
    cleanup: *id001
  assertions:
  - description: CD-ROM inject does not occur without feature gate
    type: negative_validation
  - description: VM does not require restart for the inject operation
    type: negative_validation
  patterns:
    primary: storage-hotplug-001
    helpers_required: *id002
    decorators: *id003
  variables:
    closure_scope:
    - name: ctx
      type: context.Context
    - name: namespace
      type: string
  test_structure:
    describe: CD-ROM Hotplug Operations
    context: CD-ROM inject operations
    it: '[NEGATIVE] CD-ROM inject blocked when feature gate is disabled'
  code_structure:
    framework: ginkgo_v2
    pattern: Describe -> Context -> It
    pending: true
