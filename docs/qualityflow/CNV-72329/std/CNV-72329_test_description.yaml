          purpose: "Create and manage VM lifecycle"
        - name: "network_nad"
          functions: ["create"]
          purpose: "Create bridge NADs"
        - name: "assert_ping_successful"
          functions: ["ping"]
          purpose: "Validate network connectivity"
      decorators:
        - "pytest.mark.tier2"
        - "pytest.mark.p0"

    variables:
      closure_scope:
        - name: "vm"
