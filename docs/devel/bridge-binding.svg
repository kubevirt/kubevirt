<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="840" viewBox="0 0 1040 840">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1040" height="840" fill="white"/>

  <!-- ============ LEGEND ============ -->
  <rect x="775" y="40"  width="240" height="40" fill="#FFA040" stroke="#888" stroke-width="1"/>
  <text x="895" y="65"  text-anchor="middle" font-family="Arial,sans-serif" font-size="14">veth pair</text>

  <rect x="775" y="110" width="240" height="40" fill="#90EE90" stroke="#888" stroke-width="1"/>
  <text x="895" y="135" text-anchor="middle" font-family="Arial,sans-serif" font-size="14">tap</text>

  <rect x="775" y="180" width="240" height="40" fill="#87CEEB" stroke="#888" stroke-width="1"/>
  <text x="895" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="14">bridge</text>

  <!-- ============ NODE BOX ============ -->
  <rect x="10" y="10" width="730" height="810" fill="white" stroke="black" stroke-width="2"/>

  <!-- Node label -->
  <rect x="290" y="790" width="120" height="26" fill="#808080" rx="5" ry="5"/>
  <text x="350" y="808" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="white">node</text>

  <!-- ============ COMPUTE CONTAINER ============ -->
  <rect x="40" y="40" width="660" height="512" fill="white" stroke="#FFB84D" stroke-width="2"/>
  <text x="60" y="544" font-family="Arial,sans-serif" font-size="13" fill="#888">compute container</text>

  <!-- ============ VIRTUAL MACHINE BOX ============ -->
  <rect x="75" y="60" width="580" height="175" fill="white" stroke="#FFB84D" stroke-width="2"/>
  <text x="97" y="226" font-family="Arial,sans-serif" font-size="13" fill="#888">virtual machine</text>

  <!-- eth0 (white, inside VM) -->
  <rect x="272" y="88" width="168" height="50" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="356" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="14">eth0</text>

  <!-- "Configured by DHCP" label -->
  <rect x="490" y="97" width="186" height="34" fill="#FFAAAA" stroke="#CC2222" stroke-width="1.5" rx="15" ry="15"/>
  <text x="583" y="119" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#770000">Configured by DHCP</text>

  <!-- Line: eth0(VM) bottom → vnet0 top -->
  <line x1="356" y1="138" x2="356" y2="260" stroke="black" stroke-width="1.5"/>

  <!-- ============ "Configured by virt-handler" RED DASHED BOX ============ -->
  <!-- Encompasses vnet0, br1, AND eth0 (orange) -->
  <rect x="225" y="252" width="257" height="248" fill="none" stroke="#CC2222" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- "Configured by virt-handler" label pill -->
  <rect x="492" y="354" width="218" height="34" fill="#FFAAAA" stroke="#CC2222" stroke-width="1.5" rx="15" ry="15"/>
  <text x="601" y="376" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#770000">Configured by virt-handler</text>

  <!-- vnet0 (green / tap) -->
  <rect x="272" y="260" width="168" height="50" fill="#90EE90" stroke="black" stroke-width="1.5"/>
  <text x="356" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="14">vnet0</text>

  <!-- Line: vnet0 bottom → br1 top -->
  <line x1="356" y1="310" x2="356" y2="332" stroke="black" stroke-width="1.5"/>

  <!-- br1 (blue / bridge) -->
  <rect x="272" y="332" width="168" height="50" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <text x="356" y="362" text-anchor="middle" font-family="Arial,sans-serif" font-size="14">br1</text>

  <!-- Line: br1 bottom → eth0 (orange) top -->
  <line x1="356" y1="382" x2="356" y2="440" stroke="black" stroke-width="1.5"/>

  <!-- eth0 (orange / pod interface) -->
  <rect x="272" y="440" width="168" height="50" fill="#FFA040" stroke="black" stroke-width="1.5"/>
  <text x="356" y="470" text-anchor="middle" font-family="Arial,sans-serif" font-size="14">eth0</text>

  <!-- Line: eth0 (orange) bottom → veth# top -->
  <line x1="356" y1="490" x2="356" y2="568" stroke="black" stroke-width="1.5"/>

  <!-- ============ "Configured by CNI" BLUE DASHED BOX ============ -->
  <!-- Encompasses eth0 (orange), veth#, and cni0 — eth0 overlaps with virt-handler box -->
  <rect x="225" y="432" width="257" height="278" fill="none" stroke="#0055AA" stroke-width="3" stroke-dasharray="6,3"/>

  <!-- veth# (orange / veth pair) -->
  <rect x="272" y="568" width="168" height="50" fill="#FFA040" stroke="black" stroke-width="1.5"/>
  <text x="356" y="598" text-anchor="middle" font-family="Arial,sans-serif" font-size="14">veth#</text>

  <!-- Line: veth# bottom → cni0 top -->
  <line x1="356" y1="618" x2="356" y2="640" stroke="black" stroke-width="1.5"/>

  <!-- cni0 (blue / bridge) -->
  <rect x="272" y="640" width="168" height="50" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <text x="356" y="670" text-anchor="middle" font-family="Arial,sans-serif" font-size="14">cni0</text>

  <!-- "Configured by CNI" label pill -->
  <rect x="492" y="652" width="152" height="34" fill="#AACCFF" stroke="#0055AA" stroke-width="1.5" rx="15" ry="15"/>
  <text x="568" y="674" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#002277">Configured by CNI</text>

  <!-- ============ DHCP SERVER (front) ============ -->
  <!-- "Configured by virt-launcher" green dashed box — only DHCP Server -->
  <rect x="58" y="309" width="182" height="100" fill="none" stroke="#2E7D32" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- DHCP Server oval -->
  <ellipse cx="149" cy="357" rx="82" ry="40" fill="#228B22"/>
  <text x="149" y="352" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white">DHCP</text>
  <text x="149" y="368" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white">Server</text>

  <!-- Arrow: DHCP Server → br1 -->
  <line x1="231" y1="357" x2="270" y2="357" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- "Configured by virt-launcher" green label -->
  <rect x="58" y="418" width="182" height="42" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5" rx="10" ry="10"/>
  <text x="149" y="435" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#1B5E20">Configured by</text>
  <text x="149" y="451" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#1B5E20">virt-launcher</text>
</svg>
