---
apiVersion: kubevirt.io/v1
kind: VirtualMachineInstance
metadata:
  labels:
    special: vmi-dra-pgpu
  name: vmi-dra-pgpu
spec:
  domain:
    devices:
      disks:
      - disk:
          bus: virtio
        name: containerdisk
      - disk:
          bus: virtio
        name: cloudinitdisk
      gpus:
      - claimName: pgpu-resource-claim
        name: example-gpu
        requestName: pgpu
      rng: {}
    memory:
      guest: 1024M
    resources: {}
  resourceClaims:
  - name: pgpu-resource-claim
    resourceClaimTemplateName: pgpu-resource-claim-tmpl
  terminationGracePeriodSeconds: 0
  volumes:
  - containerDisk:
      image: quay.io/oshoval/fedora-with-test-tooling:latest
    name: containerdisk
  - cloudInitNoCloud:
      userData: |-
        #cloud-config
        password: fedora
        chpasswd: { expire: False }
    name: cloudinitdisk
