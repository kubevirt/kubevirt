---
# This example demonstrates VM-scoped persistent ResourceClaims using DRA.
# Unlike vmi-dra-pgpu.yaml (which uses pod-scoped claims that are deleted on restart),
# this VM creates ResourceClaims owned by the VM. The claims persist across VMI restarts,
# ensuring the same device is re-attached when the VM is restarted.
#
# Prerequisites:
#   - Kubernetes DRA (DynamicResourceAllocation) feature gate enabled
#   - KubeVirt GPUsWithDRA or HostDevicesWithDRA feature gate enabled
#   - A ResourceClaimTemplate named "pgpu-resource-claim-tmpl" in the same namespace
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  labels:
    kubevirt.io/vm: vm-dra-pgpu
  name: vm-dra-pgpu
spec:
  runStrategy: Halted
  resourceClaimTemplates:
  - name: pgpu-resource-claim
    resourceClaimTemplateName: pgpu-resource-claim-tmpl
  template:
    metadata:
      labels:
        kubevirt.io/vm: vm-dra-pgpu
    spec:
      domain:
        devices:
          disks:
          - disk:
              bus: virtio
            name: containerdisk
          - disk:
              bus: virtio
            name: cloudinitdisk
          gpus:
          - claimName: pgpu-resource-claim
            name: example-gpu
            requestName: pgpu
          rng: {}
        memory:
          guest: 1024M
        resources: {}
      resourceClaims:
      - name: pgpu-resource-claim
        resourceClaimTemplateName: pgpu-resource-claim-tmpl
      terminationGracePeriodSeconds: 0
      volumes:
      - containerDisk:
          image: registry:5000/kubevirt/fedora-with-test-tooling-container-disk:devel
        name: containerdisk
      - cloudInitNoCloud:
          userData: |-
            #cloud-config
            password: fedora
            chpasswd: { expire: False }
        name: cloudinitdisk
