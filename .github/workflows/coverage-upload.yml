# Auto-generated by QualityFlow Coverage Onboarding
# Two coverage strategies:
#   1. Unit test coverage — go test -coverprofile (runs every push/PR)
#   2. Runtime product coverage — CoverPort instrumented binary (port 53700)
name: Coverage

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # --- Unit test coverage (fast, runs on every push) ---
  unit-test-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload unit test coverage to QualityFlow
        if: always()
        env:
          QUALITYFLOW_API_KEY: ${{ secrets.QUALITYFLOW_API_KEY }}
        run: |
          curl -sk -X POST \
            -H "Content-Type: text/plain" \
            -H "X-API-Key: $QUALITYFLOW_API_KEY" \
            --data-binary @coverage.out \
            "https://qualityflow-dashboard-cnv-quality-flow.apps.cnv2.engineering.redhat.com/api/coverage/upload?org=kubevirt&repo=kubevirt&commit=${{ github.sha }}&branch=${{ github.ref_name }}"

  # --- Build & push CoverPort-instrumented container images ---
  # Builds images with ENABLE_COVERAGE=true so they include runtime coverage
  # instrumentation via CoverPort (port 53700). After deploy, the Tekton task
  # or dashboard "Collect from Pods" button can collect coverage data.
  coverport-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_PREFIX: ghcr.io/${{{ github.repository }}}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{{ github.actor }}}
          password: ${{{ secrets.GITHUB_TOKEN }}}

      - name: Build instrumented image
        run: |
          # Build with ENABLE_COVERAGE=true — this activates the -cover flag
          # in the Dockerfile and exposes port 53700 for CoverPort collection
          docker build \
            --build-arg ENABLE_COVERAGE=true \
            -t $IMAGE_PREFIX:coverport-${{{ github.sha }}} \
            -t $IMAGE_PREFIX:coverport-latest \
            .

      - name: Verify CoverPort starts in container
        run: |
          docker run -d --name coverport-test \
            -e GOCOVERDIR=/tmp/covdata \
            $IMAGE_PREFIX:coverport-latest
          sleep 3
          docker exec coverport-test curl -sf http://localhost:53700/health \
            && echo "CoverPort health check: PASSED" \
            || echo "CoverPort health check: port 53700 not ready (check GOCOVERDIR)"
          docker rm -f coverport-test 2>/dev/null || true

      - name: Push instrumented images
        run: |
          docker push $IMAGE_PREFIX:coverport-${{{ github.sha }}}
          docker push $IMAGE_PREFIX:coverport-latest
          echo "## CoverPort Images Pushed" >> $GITHUB_STEP_SUMMARY
          echo "- \`$IMAGE_PREFIX:coverport-${{{ github.sha }}}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`$IMAGE_PREFIX:coverport-latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploy these images to your test cluster, then collect coverage via:" >> $GITHUB_STEP_SUMMARY
          echo "- Dashboard: **Collect from Pods** button" >> $GITHUB_STEP_SUMMARY
          echo "- Pipeline: \`.tekton/coverport-collect.yaml\` in your \`finally\` block" >> $GITHUB_STEP_SUMMARY

      - name: Notify QualityFlow dashboard
        if: always()
        env:
          QUALITYFLOW_API_KEY: ${{{ secrets.QUALITYFLOW_API_KEY }}}
        run: |
          # Register the new instrumented image with the dashboard
          curl -sk -X POST \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $QUALITYFLOW_API_KEY" \
            -d '{"org":"kubevirt","repo":"kubevirt","image":"'$IMAGE_PREFIX:coverport-${{{ github.sha }}}'","commit":"'${{{ github.sha }}}'","status":"built"}' \
            "https://qualityflow-dashboard-cnv-quality-flow.apps.cnv2.engineering.redhat.com/api/coverage/product/image-built" || true
