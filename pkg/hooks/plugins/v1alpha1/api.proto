syntax = "proto3";

package kubevirt.hooks.plugins.v1alpha1;

service NodeHookService {
    rpc ExecuteNodeHook(ExecuteNodeHookRequest) returns (ExecuteNodeHookResponse);
}

message NodeContext {
    string node_name = 1;
}

message ExecuteNodeHookRequest {
    string hookPoint = 1;
    bytes vmi = 2;
    NodeContext node_context = 3;
}

message ExecuteNodeHookResponse {}

service DomainHookService {
    rpc MutateDomain(MutateDomainRequest) returns (MutateDomainResponse);
}

message SidecarContext {
    string invocation_context = 1;
    reserved 2;
}

message MutateDomainRequest {
    string domain_type = 1;
    bytes domain = 2;
    bytes vmi = 3;
    SidecarContext sidecar_context = 4;
}

message MutateDomainResponse {
    bytes domain = 1;
}
